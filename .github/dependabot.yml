# Dependabot — automatic dependency updates

version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      go-deps:
        patterns: ["*"]
    ignore:
      - dependency-name: "github.com/charmbracelet/huh"
        versions: [">=1.0.0"]
      - dependency-name: "github.com/charmbracelet/huh/spinner"
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      actions-deps:
        patterns: ["*"]
